  <script>
    // Data
    const variantsData = [
      { id: 1, title: "The human body", text: "The human body changes as it ages. The peak time for the human body is thought to be around the age of thirty. The body has an amazing capacity to renew, but cells can only divide a limited number of times. Thus, as we get older, our ability to repair damaged body parts decreases. Among the typical symptoms of ageing is the hair loss, poor eyesight and hearing and wrinkles. The hair growth slows down, and the hair becomes thin and weak. As for the eyesight, the eye muscles become less flexible, which makes focusing on a range of distances more difficult. The cells of the inner ear are very delicate. They get damaged or die over time. The skin cells produce less collagen, and wrinkles form.\nHowever, it's not all bad. Today people live much longer than they used to live in the past. Modern scientists are doing everything to slow down the complex processes of human ageing." },
      { id: 2, title: "Saving water", text: "If you want to think and live green, the first thing you should reconsider is how you use water. Water shortages are a big problem all over the world. So, it is important to get serious about saving water. Check if there is any leak and fix it as you may be losing a lot of water because of it.\nThere are also many lifestyle changes you can introduce to save more water. Don't run the tap when you brush your teeth. It's also a good idea to install a special water-saving shower head. You may also shorten your time in the shower and prefer showers to baths. If you are going to use a dishwasher or a washing machine, make sure it's full. It will also help you to save water and energy. You can use only cold water to wash your linen and collect grey water for watering plants. Finally, a lot of water is wasted in the kitchen while cooking or rinsing dishes, so install special devices to control the use of water in the kitchen." },
      { id: 3, title: "Happiness", text: "Being with other people is definitely a key part of happiness. There is a broad agreement among happiness researchers and scientists that social relations are essential for people's happiness. Certainly, basic living standards are essential for well-being too. Still, after the baseline has been made, happiness varies more with quality of human relationships than income. People have a basic need to feel connected with others, and close, caring bonds with other people play a major part in our motivation and behaviour. We are social creatures, and the importance of this is clearly seen when one compares the satisfaction people feel in relationships with their overall satisfaction with life. The most important social relationships appear to be the ones where you experience things together with others, sharing thoughts and feelings as well as giving and receiving support." },
      { id: 4, title: "A book", text: "Many people want to write a book at some point of their life. Now anyone can manage it if they follow some simple steps. First of all, one needs to understand what the book is going to be about. Then it's time to think about the genre. It should suit the idea and be attractive for the potential readers. The next logical step would be to outline the story and write the first draft. It's also necessary to think of a good beginning. The first pages should catch the reader's eye- it's they which can either make or break the book. If these pages are not good enough, most readers will just lose their interest and will never return to the book again. At this point one should also organize their writing space and set their writing routine. Many writers have word count goals per day to keep the process going. Finally, one may self-publish the book on the Internet and wait for the response." },
      { id: 5, title: "Chinese", text: "Scientists are certain that the art of writing was known to the Chinese as early as 2000 BC. It is not very easy to learn the Chinese writing system. This is so because the Chinese language doesn't have any alphabet. Each word of the language is represented by a symbol or even a combination of several symbols. This means the language has to have as many symbols as the total number of words in it. It is enough to know about 25,000 symbols to use Chinese in the written form well. One may think it is a hopeless task to learn so many symbols. However, it is not like that because many symbols look like the corresponding real life objects. Considering the number of symbols in the Chinese language, it is especially interesting to know that the Chinese invented a kind of a printing press in the 10th century. It is much earlier than the printing press in Europe." },
      { id: 6, title: "The Stone Age", text: "The Stone Age man used natural glass. He found it by chance. He used it to make weapons, ornaments and money. Then people learned to produce glass. We don't know much about how it happened. They say that Africa was may be one of the original centers to make glass. Ancient traders sold glass in the Mediterranean countries.\nEgypt was one more country where people could make glass at an early time.\nThe first glass object was created around 3500 BC in Egypt. We know for sure that this industry was very popular in Egypt. The Egyptians learned to press glass into molds. In the 18 century local craftsmen discovered how to blow glass. Before that, glass was very expensive. Only really wealthy people could buy glass. Thanks to this invention, everyone could afford it. Egypt produced a lot of glass things. We can still see some of them in museums." },
      { id: 7, title: "Electricity", text: "Electricity has changed our life in many ways. We can now stay up longer and devote more time to work, studies or entertainment because we don't depend on the daylight anymore. Still, lighting your home needs energy, and you should never forget about energy-saving measures in your household. If you want to run an eco-friendly household, an important thing is to invest in the right light bulbs.\nEnergy-saving light bulbs are more efficient than the old ones. They have actually been in our shops for a long time, but it has taken people much time to come round to the idea. Energy-saving light bulbs are slightly more expensive than ordinary ones but they are certainly not a waste of money. Such light bulbs use much less electricity thus cutting your electricity bill down. They also last longer, which means you don't have to spend money replacing them. One energy-saving light bulb can substitute six ordinary ones." },
      { id: 8, title: "Birds", text: "Birds live everywhere. They vary from pigeons in big cities to penguins in the Antarctic. However, all birds have similar features. For example, they all have wings. Still, not all of them can fly. All birds also have feathers. In fact, birds are the only living animals that have feathers. Birds build nests, in which female birds lay eggs.\nBirds are warm-blooded. It means that their body temperature stays about the same. It doesn't depend much on the temperature of their surroundings. Mammals, including humans, are also warm-blooded Birds have always fascinated people. Many people keep birds as pets. We also enjoy watching them in the wild or at zoos. In addition, farmers raise chickens, ducks and geese for their meat and eggs. Also, some people are quite fond of bird hunting." },
      { id: 9, title: "Air travel", text: "It is hard to imagine the world today without air travel. In the past people were always dreaming about the sky. We know many old legends about ancient people who learned to fly. We can still read these myths in books. Heroes of these books had some magical power. In the 18th century people started to use hot air balloons. This is how they travelled by air. Then the invention of planes changed the way we travel. It made travelling very easy. Planes gave us a great chance to explore every part and corner of the world. Coping with natural disasters like floods also became much easier. The Wright Brothers from the USA invented the first airplane. It happened in the 19th century. After high school they started to do experiments and research to develop an airplane. Their interest and passion for planes led to the development of the first plane." },
      { id: 10, title: "Romans", text: "A translation service is a Roman invention. Romans employed scholars to translate various pieces of literature. It is not very easy to be a translator. Firstly, you should know both the language you translate from and the one you translate into. It was stated by the English scholar Roger Bacon, and it is still important today.\nSecondly, translators are often hidden characters. They are unnamed people who have paved the way for us to learn about ideas and theories from other cultures.\nIn the past, working as a translator was really dangerous in some cases. Translators were needed in long overseas voyages to distant lands, and such journeys didn't always end successfully. Translators even have their patron saint- Saint Jerome. He was the first person to produce a legal translation of the Bible. Thirdly, any mistake that a translator makes may turn out to be a very costly one." },
      { id: 11, title: "Paper", text: "People use paper every day. Still, few of us think about where and how it was invented. In the past people used various plants to write. It could be bamboo or rice. They also had animal skins to write. Paper was invented in China many centuries ago.\nIt was thin and made from vegetable fiber or old cloth. The technology of producing paper moved from China to Japan. Then it moved to Korea where they usually made it from tree bark. Only much later the invention spread to the Middle East. As the legend goes, the secret of making paper was obtained from two prisoners of war. Then the first paper mills were founded. Both Spain and Italy claim to be the first to manufacture paper in Europe. Until the 19th century, rags were the main ingredient for paper. Then people discovered that wood could be pulped and turned into paper." },
      { id: 12, title: "Animals", text: "Rabbits are nice-looking small animals. They look much like hares and have long ears and short tails. They live in most countries of the world. There are some interesting facts about rabbits. For instance, there are over 150 colours of coats of rabbits but only five colours of their eyes. One more funny fact about rabbits is that they can hear what is happening behind them without turning their head. At first people treated rabbits as a good and cheap source of tasty meat and fur for winter clothes. However, rabbits breed too fast- a rabbit can have up to 38 babies in one year. That is why in many parts of the world they have become pests. Some countries such as Australia still find it really hard to control the constantly growing population of rabbits. Now many people like to keep rabbits as pets. They are quite friendly and allow children to play with them." },
      { id: 13, title: "Rome", text: "At its height the population of the city of Rome was probably over 1 million people. However, the Roman Empire was an agricultural society. Most people there made their living from farming. It means that only a small part of the population lived in towns. In the Roman Empire there were two types of people- citizens and non-citizens. Roman citizens had certain privileges. Women had a kind of limited Roman citizenship. They could not vote or hold a public office. Many of the inhabitants of Rome were slaves. Prisoners of war were made slaves and any children slaves had were also slaves. A slave's life was terrible. Most were probably treated reasonably just to keep them working well. Slaves who worked in mines probably suffered most. Some slaves did manage to save enough money to buy their freedom. Others were granted their freedom by their owners." },
      { id: 14, title: "Living space", text: "If you are looking for ideas to design your living space, think about your friends' homes which truly inspire you. When you visit your friends and family, think how you feel in their homes. You may find some of them cluttered with too many decorations or being too bold for your style. However, even such houses may give you an idea of what you certainly don't want to have in your flat. Understanding how you feel in actual living spaces can help you find out which style you want to bring into your own home. If there is a home in particular where you feel comfortable, relaxed, and rested, you should think about what elements of these living spaces you like best, and which ones you can copy. Moreover, if you have a friend who has a style much like your own, ask him or her to help you as you work on your own room design." },
      { id: 15, title: "Our planet", text: "Our planet has five large oceans. In fact, the Earth's surface is more than two thirds water. Our oceans are so huge and deep that many of their parts still remain unexplored. Some parts of oceans have little or no life, but others are bursting with activity. Oceans are divided into zones according to depth. The tidal zone is the shallowest one. It's basically the area where the land meets the sea. It's a tricky place to survive with a constant battering by wind and water, but plants still thrive there.\nThen comes the open ocean. The next zone is called the twilight zone which is far below the sunlit surface areas. There is very little life there, but some creatures still survive even in these conditions. Then comes the dark zone. No light hits this region, but there is still life there. The final zone is the ocean's deep dark trenches. People know very little about these mysterious areas." },
      { id: 16, title: "Eco-friendly lifestyle", text: "When you are thinking of starting to live green, your cooking habits are probably the last area where you think you need some improvement. However, being smart in the kitchen is very important for a truly eco-friendly lifestyle. One important example is that you can lose a lot of heat if you open an oven door while baking something. Even if you do it for a short period of time, it will take a significant amount of energy to heat the oven back up. Another important problem is buying pre-packaged products. Billions of plastic packages like milk bottles or coffee capsules end up in landfills. It is much better to buy products with packages that can be recycled. Use energy-saving cooking methods and turn on your dishwasher only when it's full. Don't buy too much food not to throw the leftovers away. These simple steps are in fact a great contribution to fighting environmental problems." },
      { id: 17, title: "Housecleaning", text: "If you want to live green, you will have to reconsider many aspects of your life. Housecleaning is certainly one of them. We clean our homes on a regular basis, but we rarely think about what products we use to do it. Using harmful chemicals to clean is very bad for the environment. When you wash them away, you are simply putting them into the global water supply. This means water will have to take more purification before it is safe enough to use it again. The obvious solution is to use natural products like vinegar, lemons and soda which can easily cope with most dirt in your house. When you go shopping for cleaning products, make sure they don't contain any harmful ingredients. Do not forget that some cleaning products may actually be toxic and thus damage your health, so check for that as well. This is an easy way to contribute to fighting pollution all over the world." },
      { id: 18, title: "Animals", text: "Horses are beautiful and powerful animals that can be found in almost every country in the world. They have oval-shaped hooves, long tails, short hair and long, slender legs. Horses have long been domesticated by people. In the past, they were the most common means of travelling and transportation. Farmers also used them as a source of motive power. Today, horses still serve in work roles. However, they are just as common for sport, recreation and hobby. Domestication of horses has led to wide variations in the characteristics of breeds of horses. They vary from very slim to massive. Some horses are built for speed, strength or steadiness. The most valuable ones are certainly a combination of these important qualities. Horses are highly social herd animals. They prefer to live in a group. There is always a dominant horse in the herd, while others obey it. The dominant horse directs the behaviour of others." },
      { id: 19, title: "Building", text: "A long time ago men learnt how to make structures with walls and roofs to protect themselves from bad weather and wild animals. These ancient structures were quite primitive and very different from modern buildings. Still, they gave people shelter and comfort which they needed. Now there are many types of buildings in the world. They vary in size, shape and function. There are several factors which influence the construction of a building. Firstly, builders need to consider which building materials are available or suit better. Secondly, they must know what a building is going to be used for. Moreover, they should think about land prices and climate in the area where they are going to construct a building. It is not a very good idea to build a house with big windows in the north or construct a lot of detached houses in the city centre where land is very expensive." },
      { id: 20, title: "Design a room", text: "When you are going to design a room, it is a good idea to think about the psychology of colour. When you plan your space, keep in mind that different colours, textures and layouts can have an impact on the way people feel in your room. Colour in particular can influence people's mood. Red is associated with passion and anger, and can even cause headaches. It is a great accent colour for one wall, or for a couch or another piece of furniture, but some experts suggest that you should not paint an entire room red. Green is associated with calm and rest, and is a great colour for living rooms and bedrooms. However, too much green might take the energy out of a room, so you should combine it with a bit of red or orange to counteract its calming effects. Blue is also known as a calming and intellectual colour, but it can also appear cold unless you choose a blue with a warm base instead of a cool base." },
      { id: 21, title: "Industries", text: "Thanks to their industries, British towns grew into cities in the late 1800s. Many people became much better off, and their standards of living improved greatly. Rich families even had houses with bathrooms. At that time the British took advantage of new railway lines built to carry people and goods from one part of the country to another. For the first time people could travel long distances quickly and cheaply. Steam engines were used to power locomotives as well as boats. One more improvement was the setup of a cheap postal service. Streets were lit by gas lamps, so they became safe. Special men lit the lamps every evening. People could also travel around the city cheaply using the horse-drawn buses. Some people, even women, started to ride bicycles. So, Great Britain and the British people were celebrating their wealth." },
      { id: 22, title: "A smart home", text: "A smart home is a dream of many modern families. The idea of smart homes started with the introduction of simple sensors to turn things on. For example, as you walk towards the front door, light turns on. Since that time smart home technologies have made a huge progress. It is no more an expensive thing- more and more people all over the world can now afford smart homes. You don't have to buy a smart home-you can install smart home technologies in your old property. Smart homes control things like lighting and heating for you, helping you to save money. Moreover, smart homes are a green way of living as most of them use solar energy and also make selective recycling easier. The best thing is you don't have to think about many things anymore- your smart home will tell you what clothes are the best choice for today and what food you have run out of. Life in smart homes is very comfortable." },
      { id: 23, title: "Christmas", text: "People all over the world love Christmas. In English-speaking countries it is the 25th of December. It is a time for buying and giving presents, having parties and being with family.\nPeople start to get ready for Christmas in late October or early November. Shop keepers decorate their shops with lights. They do it because shoppers start to look for presents. Shops are very busy at this time and stay open late. People with family and friends in other countries often send them cards and presents. Everyone begins to make plans for the coming holiday. Most people buy Christmas trees and put them inside the house. They put colourful decorations on them. They also sing carols. Children enjoy Advent calendars with little doors for each day until Christmas. Every day they open a new door and see a picture or a chocolate inside." },
      { id: 24, title: "A plant", text: "A plant is a living organism. It can't move. It can't feel either. Scientists divide plants by their structure and method of reproduction. There are two main types of plants. The first type is flowering plants. They have flowers and seeds. The second type is flowerless plants. They do not have flowers and reproduce by small one-celled spores. Both types of plants can be of a different size and complexity. The main parts of a plant are the leaves, flowers, stems, roots and seeds. A seed has its own food supply. Later it will help the future plant to grow. Stems grow upward above the ground. There are leaves in a pattern along the stem. Roots give support to plants. Plants need food. Some of them are self-supporting, others are dependent. Plants get their food from water and air. Some plants make oxygen as a result of the feeding process." },
      { id: 25, title: "Festivals and celebrations", text: "Like everywhere else, people in English-speaking countries enjoy different festivals and celebrations in each of the four seasons. Food, family and flowers are an important part of most celebrations. Most people like to have a family dinner on such days. A lot of people give chocolate and other sweets as presents, and some festivals have their special food. Restaurants and cafés are usually very busy on these days. As for flower shops, they sell a lot of flowers. People today often live far away from their families, so they send greeting cards at special times like Christmas, or Mother's Day, or Easter. Post offices and telephones are very busy too. Of course, times change, and festivals also change. But people have celebrated many of these festivals for hundreds of years and will still enjoy them in many years." },
      { id: 26, title: "Animals", text: "Scientists have been trying to get into the world of animals for a long time. One of their goals is to learn to communicate with every living creature in their language. In fact, animals do not use language in the same way that people do. However, many animals do communicate using sounds. For example, dogs can whine, bark or snarl. These sounds may express fear, danger, hunger, or other information. A chicken can produce more than ten signals whereas a dolphin has a range of more than twenty different sounds. Some birds, such as the gray parrot, can even copy human speech. Once a parrot managed to learn 120 words, which is amazing. Nevertheless, humans are the only animals that can use speech to express ideas. Even if animals are trained to reproduce sounds similar to those used by people, it's still not speech." },
      { id: 27, title: "Mushrooms", text: "Many people think mushrooms are plants, but they are neither plants nor animals. They are, however, living things that need food to stay alive. They particularly love damp forests. Mushrooms are one of the world's natural cleaners. When a plant or an animal dies, mushrooms help to break it down, clearing the forest of rotten things. If mushrooms didn't exist, Earth would be buried in several feet of rotten junk and life on the planet would soon disappear. Not all mushrooms look like the ones that you eat. There are many different types, and they come in all shapes, sizes and colours. In fact, people learnt to gather mushrooms and eat them a long time ago. Mushrooms are a great source of nutrients. Still, not all mushrooms are edible. Some mushrooms are very poisonous. They are often brightly coloured to warn animals not to eat them. People often call poisonous mushrooms toadstools." },
      { id: 28, title: "A river", text: "A river is fresh water flowing across the land surface. All rivers start at the highest point in an area. It can be a mountain or a hill. There rainwater or melting snow forms tiny streams. As the river flows downstream, it gains more water. It gets water from other streams, rivers, springs, added rainfall, and other water sources. When one stream meets another, they merge together. This may result in a bigger river. Usually, rivers flow to a larger body of water. It can be an ocean, a sea or a lake. We call the end of a river its mouth. Rivers flow in channels. The bottom of the channel is called the bed. The sides of the channel are called the banks. In the past, people preferred to build settlements along rivers. Rivers give us water for irrigation and drinking. Rivers also provide us with food, energy and transportation routes." },
      { id: 29, title: "Animals", text: "In order to survive, desert animals have developed ways of either keeping out of the heat or cooling down. Desert foxes, for instance, lose heat through big ears, and furry soles help them to walk on hot sand. Kangaroos lick their forearms to cool themselves down. Some animals have got bushy tails which create a sunshade for them. Others spend the day underground and hunt at night. However, extreme heat is not the only problem for desert animals. There is little water in deserts, so animals had to learn to survive without it for a long time. A camel can spend about three weeks without water. When it does have a chance to drink, it can take in a huge amount. Many people think that the water goes to the hump on its back. However, it's only a myth. Camels' humps store fat, which, when needed, will be converted to food or water. Besides, camels' coats reflect the sun rays, so camels never get too hot." },
      { id: 30, title: "Ice hockey", text: "Ice hockey is a popular team sport. It developed in Canada from games played with sticks and a ball which was later substituted with a puck. Both men and women play hockey in schools and clubs, on amateur and professional teams, on national and international levels. Ice hockey is usually played on a surface called a rink. Several boundary lines run across the rink. Two blue lines divide the rink into three zones. Hockey is a rough sport, with a great deal of body contact between the players. Hockey players wear ice skates and move with great speed and skill across the ice. The game starts with a face-off in the center of the rink. Two teams of six players compete to score the most points. A team scores when it moves the puck into the opponent's goal. Now ice hockey is a part of the Winter Olympics both for men and women." },
      { id: 31, title: "Recycling", text: "More and more people all over the world try to live green. That means they have to recycle. Recycling is the process of sorting and collecting rubbish and using it to create new products. It is an excellent way of preserving natural resources and saving energy. That is why everybody should know that more than a half of what we throw away can be successfully recycled. We can recycle almost anything. The most common materials to recycle are plastic, glass and paper. Recycling is very important for the mankind. Only if we recycle our litter, we can get rid of huge landfills which take a lot of space and cause the global warming. Recycling also helps to save our forests from being cut down. It is interesting to know that recycled materials produce up to 73% less air pollution. It is up to the common people to sort their rubbish and recycle things." },
      { id: 32, title: "Christmas", text: "Most children love Christmas. In Great Britain the holiday begins on the 24th of December. People stop their work early and gather at home with their kids. Parents cover the presents in special paper and put them under the Christmas tree. Children leave a stocking for Santa Claus when they go to bed. Santa Claus is a big man with white hair and red clothes. He brings presents for children during the night. If the house has a fireplace, the children sometimes leave their stockings by the fire. They are sure that Santa Claus comes down the chimney. Mothers and fathers tell their children that Santa Claus only comes when they are sleeping. However, children find it difficult to sleep well at Christmas night. In the morning they wake up early to see what Santa put there for them. After breakfast they open their other presents around the tree." },
      { id: 33, title: "Animals", text: "Horses have long been domesticated by people, but we still do not know much about these animals. For instance, many people think that horses are colour blind and can only see in shades of grey. However, it is not true. Horses do see colours, but they may not see them as vividly as we do. This is because they can only see two of the three visible wavelengths in the light spectrum. This is somewhat similar to the way people who are colour blind see. Your horse doesn't see the colour red, but they can see blues and greens. So, the lovely red apple or the bright orange carrot you offer as a treat may actually appear brownish or greenish to your horse. Horses have the largest eyes of any land mammal. Using both eyes, horses see virtually 360 degrees and the horse almost has a complete sphere of vision around its body with only a few small blind spots. They are not a problem for horses as by moving their head they see what they need perfectly." },
      { id: 34, title: "Water hole", text: "During the dry season in the savanna, the only reliable place to find water is at a water hole. Thus, it can be a very busy place. Basically, a water hole is a pool or a depression in the ground in which water can collect. Animals visit a water hole frequently, especially elephants which have to drink about 200 litres of water a day. Oftentimes an animal leaves a water hole dirtier than ever. They try to cover themselves in the mud because it cools them down and it may also help them to get rid of nasty insects that usually infect the animal's skin. Sometimes larger animals are accompanied by small birds to a water hole. These birds hope to find insects on the animal's skin. As well as insect control, such birds may also clean up any wounds the host animal may have. Thus, both host animals and birds are happy. In general, birds can often be seen wading in water holes, looking for fish and frogs." },
      { id: 35, title: "Corals", text: "Corals are sea animals that stay in one place during their lives. Corals can be very colourful underwater, but most types fade when they die or when they are removed from the water. Corals live in all the oceans of the world, in places where the water is warm. Some types live alone. Many types live together in groups called colonies. In fact, several different types of corals together can form really huge colonies. These colonies are called coral reefs. They look like plants. People have long used corals to make decorations. But this and other human activities have put many corals at risk. Rising ocean temperatures, oil spills and chemical pollution harm corals. Boats that float over reefs may also damage corals. People must do everything they can to protect them from extinction." },
      { id: 36, title: "Ants", text: "Everybody knows about ants. Ants are small insects. They are usually yellow, brown, red or black. In various stories and fables ants are shown as hardworking creatures. They seem to be moving all the time, carrying objects to their homes. Ants can lift about 20 times their own body weight, which is amazing Ants are social insects. This means that they live together in organized communities called colonies.\nAnts are found almost everywhere in the world, but they are most common in hot areas. They make anthills or live under the ground. Some cultures use ants for food and medicine. However, in many countries ants are considered pests. This is so because they can get into cupboards around the house. In fact, ants are very hard to remove from the house as it is difficult to destroy a whole colony of ants." },
      { id: 37, title: "A mountain", text: "A mountain is a form of land that rises high in a limited area. It is higher and steeper than a hill. Mountains must be higher than 600 meters. They consist of rocks and earth. They usually have steep, sloping sides. They also have sharp or slightly rounded peaks. Some mountains may have trees which grow on their sides. Very high mountains may have snow on their peaks. Long chains or groups of mountains are mountain ranges. They can be short or very long. A group of these makes a mountain system. Mountains exist on every continent of our planet and even beneath the ocean.\nIn fact, some of the highest mountains are at the bottom of the sea. For example, Hawaii is at the top of a volcanic mountain in the Pacific Ocean. More than half the mountain is below water. 75% of the world's countries have mountains." },
      { id: 38, title: "Polar regions", text: "Polar regions are often dark with freezing winds, and they receive little rain. Only the toughest can survive in such unwelcoming conditions. Polar animals have developed various mechanisms to protect themselves from the harsh climate. Penguins, for instance, huddle together to stay warm. The ones on the outside of the huddle aren't so well protected from the cold, so they take turns standing in the middle. A lot of animals have got thick coats or long feathers, like the snowy owl, whose feathers are long enough to cover its legs. Larger animals lose heat more slowly than smaller ones, so many Arctic animals are quite big. A male polar bear can weigh up to 800 kilos. It's not only animals that need to wrap up warm-plants do too. They have a lot of tiny overlapping leaves that completely cover the short stem.\nPlants can also stop growing if it's too cold and start growing again when the weather becomes better." },
      { id: 39, title: "Happiness", text: "There is nothing fancy or expensive about happiness. On the contrary, happiness is simple and slow. It means choosing peace and quiet over excitement. It is wearing your old pajamas and watching a movie the day before Christmas. It is sitting in your window watching the weather while sipping your favourite tea on a rainy day. It is looking into the bonfire surrounded by your friends and family while your bread is slowly baking. Happiness is always about appreciating the simple pleasures in life and thus it can be achieved on a really low budget. You cannot buy the right atmosphere or a sense of togetherness. It's all about time, interest and engagement in the people around you. Thus, happiness is an atmosphere which is not improved by spending more money on it, but rather, in some ways, the opposite.\nAfter all, the best things in life are absolutely free." },
      { id: 40, title: "Education", text: "Education is vital for modern people. Now in most countries one can get education for free. However, it was not like that in the past. In ancient Rome people did not have any formal education. Parents but not schools provided children with knowledge and skills at that time. These could be military, domestic or agricultural skills. Then schools appeared. They were only for boys between 9 and 12 years old who came from wealthy families. Girls could not study there. Roman schools taught writing and speaking skills and poetry. Foreign languages were also very important. Students had to learn some subjects in Greek to help them master this difficult language. Best students got books as a reward from schools. That was a very expensive present as books were rare at that time. School teachers were deeply respected by the Romans and earned a high salary." },
      { id: 41, title: "Animals", text: "Everybody knows about ducks. The duck is a water bird. There are about 100 species, or types, of ducks. They are found almost all over the world. These birds are rather small. Soft inner feathers protect them from cold. A gland near the tail produces oil. This oil helps protect the outer feathers from water. Most types of ducks feed at the water surface. They dip their heads below the surface while tipping up their tails. They eat many plants and insects. Many ducks nest on the ground near water, but some types nest in trees. They take care of their ducklings until they can feed themselves and then let them roam free. Many types of ducks migrate, or fly long distances to spend different seasons in different regions. People keep ducks for their meat, eggs, and feathers. Some hunters shoot ducks for sport" },
      { id: 42, title: "Zetlanders", text: "According to many surveys, Zetlanders are the happiest people in Europe. Zetland is also one of the happiest countries in the world. This has created a lot of media interest. It is important to point out that there are several reasons why Zetlanders are so happy. Firstly, judging by the statistics, Zetlanders are the ones who meet most often with their friends and family, which helps them feel calm and peaceful. Secondly, the economy of Zetland is aimed at reducing risk, uncertainty and anxiety among citizens. Zetlanders understand that while paying taxes they are investing in their society and collective well-being. Of course, this country is not perfect, but it can definitely be a source of inspiration for all of us. We should start by looking at ourselves and realizing that anything we do influences the people around us. Thus, we are responsible for our own well-being. That's what Zetlanders understand very well." },
      { id: 43, title: "Medicine", text: "Modern medicine is developing very fast. New important discoveries are made by scientists every day. Still, you should not think that in ancient times medicine was primitive. In the Roman Empire doctors made very important discoveries. Without them modern medicine would have been impossible. Roman doctors were mainly Greek slaves. At first they were poor and had a very low status. Later Roman doctors began to write books about illnesses and their treatment. In the first century BC a Roman doctor suggested that tiny animals like rats caused disease. Unfortunately with no modern equipment there was no way of testing his theory. The Romans were also skilled engineers, and they created a system of public health. They also knew that dirt could be a reason for disease. That is why they paid special attention to keeping their towns clean." },
      { id: 44, title: "Live Green", text: "According to the statistics, doing crafts is one of the most popular hobbies these days. However, as more and more people choose to live green, their attention turns to not simply doing crafts, but upcycling. Upcycling means you can take the things that you own but do not use anymore and then turn them into new treasures. Once you upcycle one thing, you will probably want to do it with everything you have ever used. To get started, find the things in your house that are just gathering dust. Rather than throwing them away, think about some potential projects you could create. For example, you can spray some paint on an old glass jar to turn it into a modern vase or make a magazine rack with old plastic bottles. There are no limits for your creativity and imagination with upcycling. If you don't know where to start, check the hundreds of ideas for upcycling on the Internet." },
      { id: 45, title: "Parrots", text: "If you are thinking of what pet to get, a parrot may be what you need. It is not very difficult to have a parrot as a pet. They are happy to eat fruits, nuts, seeds and buds. It is easy to find such food in pet shops, and it is not very expensive. Some parrot species from the South American continent have been observed to eat clay. They do so to flush out the toxins from their bodies which get into their system through the seeds that they feed on. There are also some parrots who feed on snails or insects, but they can't be bought in a pet shop.\nParrots are also great as pets because they have a relatively long lifespan. It varies according to the species. Small ones can live for up to twenty years, whereas medium-sized ones may have a lifespan of thirty years. Big parrots can live more than a hundred years." },
      { id: 46, title: "Rainfall", text: "It's hard to imagine our life without rain. Rainfall is important for animals and plants to survive on Earth. Rain keeps up the level of freshwater. When there is no rainfall, the flow of life is affected largely.\nIf there is little or no rain at all, lands will dry up. The dried-up land is no longer suitable for plants to grow. Farmers will have a hard time in cultivation. If there is no agriculture, humans will suffer from food shortages. The water available in the underground will be absorbed by plants. The water in wells will decrease. Since the water in the ocean is salty, the availability of freshwater will decrease considerably. It is also important to have a normal range of rainfall. If the rainfall is continuous with no intervals, that also causes big problems." },
      { id: 47, title: "Rain", text: "When we think of rain, we usually think of clear, clean water, but that is usually not true-especially in the city or in places where there are plants and factories that put smoke and other things into the water and air. The dirt, dust, and chemicals travel up into the atmosphere with water. These tiny particles become part of the clouds, which also makes them part of the rain that falls.\nOne more kind of dirty rain is acid rain. It is caused by tiny amounts of acidic chemicals released while burning fossil fuels. It's been blamed for many ecological problems. They include the destruction of coral reefs, which play an important part in protecting coastlines from tropical storms. Acid rains also put plants and animals at risk. People must stop air pollution to save our planet for future generations." },
      { id: 48, title: "Snowflakes", text: "Snowflakes are ice crystals which fall through the Earth's atmosphere as snow. People like to think that every snowflake has a unique shape. However, it's not true. While snowflakes may look different, they can still be classified into eight groups and about eighty different variants. Some scientists have done a lot of research into making a kind of a catalogue of snowflakes. The most typical patterns for a snowflake are needles, columns, plates and rimes. The shape and the pattern of a snowflake largely depend on the weather conditions. The study of snowflakes has identified that long, thin needle-like ice crystals form at around zero, while a lower temperature will lead to very flat crystals. Further changes in temperature as a snowflake falls determine more complicated shapes of snowflakes. The size of a snowflake also depends on the air temperature." },
      { id: 49, title: "Snowfalls", text: "It usually snows more in countries that are in the north. For instance, Japan, Russia or some parts of the USA may have large snowfalls. Mountains are also the places which have a lot of snow. This is especially true for such countries as China. At the same time, there are tropical countries which hardly see any snow. For some countries snow is one of the main reasons why tourists come there. As not every place in the world has snowfalls, people from hot countries come to snow-covered places in order to live the experience of seeing, touching and feeling this natural phenomenon.\nYou may think it's wonderful to have a lot of snow, but it's not always the case. A heavy snowfall can paralyze the life of a city or a country. If snow is rare in a certain location, people there are not used to it and find it hard to commute or even go outside." },
      { id: 50, title: "Rain", text: "Rain is an important part of the water cycle which never stops on our planet. Water is delivered to the ground by rains. It is retained as clouds in the sky and falls over and through the land.\nActually, this is one of the reasons why the earth is cold in winter and warm in summer. Water escapes into the atmosphere and turns into clouds.\nRain is useful for us in many different ways. Firstly, it waters the Earth and refills streams, rivers, lakes, and oceans. The water in the oceans is home to millions of sea creatures and the water in the streams, rivers, and lakes is home to fresh-water fish and other water animals.\nSecondly, rain provides the water trees and other plants need. Rain also gives wild animals the water they need to drink. Finally, people love rainy weather. It makes the air fresh and clean." },
      { id: 51, title: "Banking", text: "We live in the digital world where many things are done much more quickly and easily online.\nThe banking industry is not an exception. The most significant development in the world of banking is definitely the introduction of online banking. Digital banking is basically an online platform that enables customers to carry out financial transactions. This can include making deposits, transferring funds, paying bills, and more.\nOnline banking in its earliest forms dates back to the 1980s. However, it really began to take off with the rise of the Internet. The growing adoption of smartphones and mobile banking apps further accelerated the trend. Some people dislike digital banking, but about half of today's bank customers have gone digital only, and this figure will continue to grow." }
    ];

    // State
    let currentVariantId = 1;
    let timerInterval = null;
    let timeLeft = 60;
    let stage = 'idle'; // idle, familiarization, reading, finished
    let isSpeaking = false;
    let ttsUtterance = null;

    // Elements
    const elGrid = document.getElementById('variantGrid');
    const elTitle = document.getElementById('variantTitle');
    const elTag = document.getElementById('variantTag');
    const elText = document.getElementById('textContainer');
    const elTimer = document.getElementById('timerDisplay');
    const elStatus = document.getElementById('timerStatus');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const btnPlay = document.getElementById('btnPlayTTS');
    const btnReset = document.getElementById('btnReset');

    // Init
    function init() {
      renderGrid();
      loadVariant(1);
      // Preload voices
      if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    }

    function renderGrid() {
      elGrid.innerHTML = '';
      variantsData.forEach(v => {
        const btn = document.createElement('button');
        btn.className = `variant-btn w-full h-7 rounded-md border border-gray-200 bg-white hover:bg-teal-50 text-xs font-medium text-gray-600`;
        btn.textContent = v.id;
        btn.onclick = () => loadVariant(v.id);
        btn.id = `btn-var-${v.id}`;
        elGrid.appendChild(btn);
      });
    }

    function loadVariant(id) {
      stopAll();
      currentVariantId = id;
      const v = variantsData.find(item => item.id === id);
      if(!v) return;

      document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-var-${id}`);
      if(activeBtn) activeBtn.classList.add('active');

      elTag.textContent = `Вариант ${id}`;
      elTitle.textContent = v.title;
      elText.innerText = v.text; 
      
      resetState();
    }

    function resetState() {
      stage = 'idle';
      timeLeft = 60;
      updateTimerDisplay();
      updateStatus('Ожидание', 'bg-gray-100 text-gray-600');
      btnStart.classList.remove('hidden');
      btnStop.classList.add('hidden');
      btnReset.classList.add('hidden');
      resetTTSButton();
      elText.classList.remove('border-teal-300', 'bg-teal-50');
      elText.classList.add('bg-white');
      elTimer.classList.remove('warning', 'danger');
    }

    function resetTTSButton() {
      isSpeaking = false;
      btnPlay.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg> Озвучить`;
      btnPlay.classList.remove('bg-gray-600', 'hover:bg-gray-700');
      btnPlay.classList.add('bg-blue-600', 'hover:bg-blue-700');
    }

    function startTimer() {
      if(stage !== 'idle') return;
      stage = 'familiarization';
      timeLeft = 60;
      
      btnStart.classList.add('hidden');
      btnStop.classList.remove('hidden');
      btnReset.classList.remove('hidden');
      
      elText.classList.add('bg-teal-50', 'border-teal-300');
      updateStatus('Ознакомление (1 мин)', 'bg-blue-100 text-blue-700');
      
      runTimer();
    }

    function runTimer() {
      if(timerInterval) clearInterval(timerInterval);
      updateTimerDisplay();
      
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();

        if(timeLeft <= 10) {
          elTimer.classList.add('warning');
        }
        if(timeLeft <= 5) {
          elTimer.classList.add('danger');
        }

        if(timeLeft <= 0) {
          if(stage === 'familiarization') {
            switchToReading();
          } else if(stage === 'reading') {
            finishReading();
          }
        }
      }, 1000);
    }

    function switchToReading() {
      stage = 'reading';
      timeLeft = 90;
      elTimer.classList.remove('danger');
      updateStatus('Чтение вслух (1.5 мин)', 'bg-orange-100 text-orange-700');
    }

    function finishReading() {
      clearInterval(timerInterval);
      stage = 'finished';
      timeLeft = 0;
      updateTimerDisplay();
      updateStatus('Завершено', 'bg-green-100 text-green-700');
      btnStop.classList.add('hidden');
      elTimer.classList.remove('warning', 'danger');
    }

    function stopAll() {
      clearInterval(timerInterval);
      window.speechSynthesis.cancel();
      resetTTSButton();
    }

    function playTTS() {
      window.speechSynthesis.cancel();
      const v = variantsData.find(item => item.id === currentVariantId);
      let cleanText = v.text.trim();
      if (!cleanText.endsWith('.')) cleanText += '.';
      const textToRead = `Task one. ${v.title}. ${cleanText}`;
      
      ttsUtterance = new SpeechSynthesisUtterance(textToRead);
      ttsUtterance.lang = 'en-GB';
      ttsUtterance.rate = 0.9;
      ttsUtterance.pitch = 0.9;
      
      const voices = window.speechSynthesis.getVoices();
      const maleBritish = voices.find(voice => voice.lang.includes('en-GB') && (voice.name.includes('Daniel') || voice.name.toLowerCase().includes('male')));
      const anyBritish = voices.find(voice => voice.lang.includes('en-GB'));
      const anyEnglish = voices.find(voice => voice.lang.includes('en'));
      
      ttsUtterance.voice = maleBritish || anyBritish || anyEnglish;

      ttsUtterance.onstart = () => {
        isSpeaking = true;
        updateStatus('Озвучка...', 'bg-purple-100 text-purple-700');
        btnPlay.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg> Остановить`;
        btnPlay.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        btnPlay.classList.add('bg-gray-600', 'hover:bg-gray-700');
      };
      
      ttsUtterance.onend = () => {
        resetTTSButton();
        updateStatus(stage === 'idle' ? 'Ожидание' : 'Готово', 'bg-gray-100 text-gray-600');
      };

      window.speechSynthesis.speak(ttsUtterance);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const s = (timeLeft % 60).toString().padStart(2, '0');
      elTimer.textContent = `${m}:${s}`;
    }

    function updateStatus(text, classes) {
      elStatus.textContent = text;
      elStatus.className = `text-xs font-medium px-2.5 py-1 rounded-full ${classes}`;
    }

    btnStart.onclick = startTimer;
    btnStop.onclick = () => { stopAll(); resetState(); };
    btnPlay.onclick = () => {
      if(isSpeaking) {
        window.speechSynthesis.cancel();
        resetTTSButton();
        updateStatus('Ожидание', 'bg-gray-100 text-gray-600');
      } else {
        playTTS();
      }
    };
    btnReset.onclick = resetState;

    init();
  </script>
</body>
</html>
