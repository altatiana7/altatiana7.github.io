      { front: 'Сила тока', back: 'I = q/t\n1 А = 1 Кл/с' },

let currentSection = 0;
let currentTab = 'learn';
let currentDiff = 'easy';
let score = 0;
let streak = 0;
let answeredQuestions = {};
let selectedAnswers = {};
let matchedPairs = {};
let selectedMatchItem = null;
let cardIndex = 0;
let cardFlipped = {};

function setSection(idx) {
  currentSection = idx;
  currentTab = 'learn';
  currentDiff = 'easy';
  selectedAnswers = {};
  matchedPairs = {};
  selectedMatchItem = null;
  cardIndex = 0;
  cardFlipped = {};
  document.querySelectorAll('.nav-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
  renderSection();
}

function setTab(tab) {
  currentTab = tab;
  selectedAnswers = {};
  matchedPairs = {};
  selectedMatchItem = null;
  cardIndex = 0;
  cardFlipped = {};
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  renderSection();
}

function setDifficulty(diff) {
  currentDiff = diff;
  document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.diff === diff));
  renderSection();
}

function updateScore(points) {
  score += points;
  if (points > 0) streak++; else streak = 0;
  document.getElementById('totalScore').textContent = score;
  document.getElementById('streakCount').textContent = '🔥' + streak;
  updateProgress();
}

function updateProgress() {
  const completed = Object.keys(answeredQuestions).length;
  let total = 0;
  sections.forEach(s => {
    ['easy','medium','hard'].forEach(d => total += s.questions[d].length);
    total += s.matching.length + s.open.length + s.detailed.length;
  });
  const pct = Math.round((completed / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('completedCount').textContent = completed;
}

function renderSection() {
  const sec = sections[currentSection];
  const container = document.getElementById('sectionContent');
  container.innerHTML = `
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6 glow hover-lift">
      <div class="flex flex-col lg:flex-row items-center gap-6">
        <div class="w-full lg:w-1/2">
          <div class="img-container"><img src="${sec.image}" alt="${sec.title}" class="w-full h-auto object-cover" loading="lazy" style="min-height:200px;"></div>
        </div>
        <div class="w-full lg:w-1/2 text-center lg:text-left">
          <h2 class="text-3xl md:text-4xl font-bold gradient-text mb-3">${sec.title}</h2>
          <p class="text-lg text-gray-600 mb-4">${sec.subtitle}</p>
          <div class="bg-gradient-to-r from-pastel-50 to-burgundy-50 border-l-4 border-pastel-500 rounded-r-2xl p-4 text-lg">
            <p class="text-pastel-800 font-medium">${sec.funnyText}</p>
          </div>
        </div>
      </div>
    </div>
    <div class="flex flex-wrap gap-2 mb-6">
      <button onclick="setTab('learn')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='learn'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="learn">📚 Учим</button>
      <button onclick="setTab('cards')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='cards'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="cards">🃏 Карточки</button>
      <button onclick="setTab('trainer')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='trainer'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="trainer">🎮 Тренажёр</button>
      <button onclick="setTab('matching')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='matching'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="matching">🔗 Соответствие</button>
      <button onclick="setTab('open')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='open'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="open">✍️ Развёрнутые</button>
      <button onclick="setTab('detailed')" class="tab-btn px-5 py-2.5 rounded-xl text-base font-bold transition-all ${currentTab==='detailed'?'active':'bg-white text-pastel-700 border-2 border-pastel-200 hover:bg-pastel-50'}" data-tab="detailed">🔍 Пошаговый разбор</button>
    </div>
    <div id="tabContent">
      ${currentTab==='learn'?renderLearn():''}
      ${currentTab==='cards'?renderCards():''}
      ${currentTab==='trainer'?renderTrainer():''}
      ${currentTab==='matching'?renderMatching():''}
      ${currentTab==='open'?renderOpen():''}
      ${currentTab==='detailed'?renderDetailed():''}
    </div>
  `;
}

function renderLearn() {
  const sec = sections[currentSection];
  return `
    <div class="bg-white rounded-3xl shadow-lg p-6 md:p-8 mb-6 hover-lift">
      <h3 class="text-2xl md:text-3xl font-bold gradient-text mb-4">📖 ${sec.explanation.title}</h3>
      <p class="text-lg md:text-xl text-gray-700 mb-5 leading-relaxed">${sec.explanation.text}</p>
      <div class="grid md:grid-cols-2 gap-3 mb-5">
        ${sec.explanation.keyPoints.map(kp=>`<div class="bg-gradient-to-r from-pastel-50 to-burgundy-50 rounded-xl p-3 md:p-4 text-base md:text-lg border-l-4 border-pastel-400"><span class="text-xl mr-2">✅</span>${kp}</div>`).join('')}
      </div>
      <div class="bg-yellow-50 rounded-2xl p-4 md:p-5 border-2 border-yellow-200">
        <h4 class="text-xl font-bold text-yellow-800 mb-3">💡 Примеры из жизни:</h4>
        ${sec.explanation.examples.map(ex=>`<p class="text-lg text-yellow-900 mb-2">• ${ex}</p>`).join('')}
      </div>
    </div>
    <div class="bg-gradient-to-br from-pastel-600 to-burgundy-700 rounded-3xl shadow-xl p-6 md:p-8 mb-6 text-white">
      <h3 class="text-2xl md:text-3xl font-bold mb-5">📐 Главные формулы</h3>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
        ${sec.formulas.map(f=>`<div class="bg-white/15 backdrop-blur rounded-2xl p-4 md:p-5 hover:bg-white/25 transition-all"><div class="text-base md:text-lg font-bold mb-1">${f.name}</div><div class="text-2xl md:text-3xl font-mono font-bold mb-1 text-yellow-200">${f.formula}</div><div class="text-sm text-pastel-200">${f.desc}</div></div>`).join('')}
      </div>
    </div>
    <div class="bg-white rounded-3xl shadow-lg p-6 md:p-8">
      <h3 class="text-2xl md:text-3xl font-bold gradient-text mb-5">⚡ Быстрая проверка</h3>
      <div class="grid md:grid-cols-3 gap-4">
        ${['easy','medium','hard'].map(diff=>{
          const labels={easy:'🟢 Базовый (ОГЭ)',medium:'🟡 Средний (ЕГЭ часть 1)',hard:'🔴 Сложный (ЕГЭ часть 2)'};
          const q=sec.questions[diff][0];
          return `<div class="bg-pastel-50 rounded-2xl p-4 md:p-5 border-2 border-pastel-200"><div class="text-lg font-bold mb-2">${labels[diff]}</div><p class="text-base md:text-lg mb-3">${q.q}</p>${q.opts.map((o,i)=>`<div class="quiz-opt border-2 border-gray-200 rounded-xl p-3 mb-2 text-base flex items-center gap-2" onclick="quickCheck(${currentSection},'${diff}',0,${i})"><span class="w-8 h-8 rounded-full bg-pastel-200 text-pastel-800 flex items-center justify-center font-bold text-sm flex-shrink-0">${String.fromCharCode(65+i)}</span><span>${o}</span></div>`).join('')}<div id="quick-result-${diff}-0" class="mt-2 text-base font-semibold"></div></div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function quickCheck(secIdx, diff, qIdx, optIdx) {
  const q = sections[secIdx].questions[diff][qIdx];
  const key = `quick-${diff}-${qIdx}`;
  if (answeredQuestions[key]) return;
  const isCorrect = optIdx === q.correct;
  answeredQuestions[key] = true;
  const el = document.getElementById(`quick-result-${diff}-${qIdx}`);
  if (isCorrect) { el.innerHTML = '<span class="text-green-600 text-lg">✅ Верно! +1 балл</span>'; updateScore(1); }
  else { el.innerHTML = `<span class="text-red-600 text-lg">❌ Неверно. ${q.sol}</span>`; updateScore(0); }
}

function renderCards() {
  const sec = sections[currentSection];
  if (!sec.cards || sec.cards.length === 0) return '<div class="text-center py-12 text-2xl text-gray-400">Карточки скоро будут!</div>';
  const currentCard = sec.cards[cardIndex];
  const isFlipped = cardFlipped[cardIndex];
  return `
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl md:text-3xl font-bold gradient-text">🃏 Карточки для тренировки</h3>
        <div class="flex items-center gap-3">
          <span class="text-lg text-gray-500">${cardIndex + 1} / ${sec.cards.length}</span>
          <button onclick="shuffleCards()" class="bg-pastel-100 text-pastel-700 px-4 py-2 rounded-xl text-base font-bold hover:bg-pastel-200 transition-all">🔀 Перемешать</button>
        </div>
      </div>
      <div class="flex flex-wrap gap-1.5 mb-6 justify-center">
        ${sec.cards.map((_, i) => `<button onclick="goToCard(${i})" class="w-3 h-3 rounded-full transition-all ${i === cardIndex ? 'bg-pastel-500 scale-125' : i < cardIndex ? 'bg-green-400' : 'bg-gray-300'}"></button>`).join('')}
      </div>
      <div class="card-3d flip-card mx-auto max-w-2xl mb-6 ${isFlipped ? 'flipped' : ''}" onclick="flipCard(${cardIndex})">
        <div class="card-inner" style="width:100%;height:100%;">
          <div class="card-front bg-gradient-to-br from-pastel-500 to-burgundy-600 rounded-3xl flex flex-col items-center justify-center p-8 text-white shadow-xl">
            <div class="text-6xl mb-4">❓</div>
            <p class="text-2xl md:text-3xl font-bold text-center leading-snug">${currentCard.front}</p>
            <p class="text-pastel-200 mt-4 text-lg">Нажмите, чтобы увидеть ответ</p>
          </div>
          <div class="card-back bg-gradient-to-br from-green-500 to-emerald-600 rounded-3xl flex flex-col items-center justify-center p-8 text-white shadow-xl">
            <div class="text-6xl mb-4">✅</div>
            <p class="text-2xl md:text-3xl font-bold text-center leading-snug whitespace-pre-line">${currentCard.back}</p>
            <p class="text-green-200 mt-4 text-lg">Нажмите, чтобы вернуться</p>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-center gap-4">
        <button onclick="prevCard()" class="bg-pastel-100 text-pastel-700 w-14 h-14 rounded-2xl text-2xl font-bold hover:bg-pastel-200 transition-all hover:scale-110 ${cardIndex===0?'opacity-30 cursor-not-allowed':''}" ${cardIndex===0?'disabled':''}>⬅</button>
        <button onclick="markKnown(${cardIndex})" class="bg-green-100 text-green-700 px-6 py-3 rounded-2xl text-lg font-bold hover:bg-green-200 transition-all hover:scale-105">👍 Знаю</button>
        <button onclick="markUnknown(${cardIndex})" class="bg-red-100 text-red-700 px-6 py-3 rounded-2xl text-lg font-bold hover:bg-red-200 transition-all hover:scale-105">👎 Не знаю</button>
        <button onclick="nextCard()" class="bg-pastel-100 text-pastel-700 w-14 h-14 rounded-2xl text-2xl font-bold hover:bg-pastel-200 transition-all hover:scale-110 ${cardIndex>=sec.cards.length-1?'opacity-30 cursor-not-allowed':''}" ${cardIndex>=sec.cards.length-1?'disabled':''}>➡</button>
      </div>
      <p class="text-center text-gray-400 mt-4 text-base">Клавиши: ← → навигация, Пробел — перевернуть</p>
    </div>
  `;
}

function flipCard(idx) { cardFlipped[idx] = !cardFlipped[idx]; renderSection(); }
function nextCard() { const sec = sections[currentSection]; if (cardIndex < sec.cards.length - 1) { cardIndex++; renderSection(); } }
function prevCard() { if (cardIndex > 0) { cardIndex--; renderSection(); } }
function goToCard(idx) { cardIndex = idx; renderSection(); }
function shuffleCards() { const sec = sections[currentSection]; if (sec.cards) { for (let i = sec.cards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [sec.cards[i], sec.cards[j]] = [sec.cards[j], sec.cards[i]]; } cardIndex = 0; cardFlipped = {}; renderSection(); } }
function markKnown(idx) { updateScore(1); answeredQuestions[`card${currentSection}${idx}`] = true; nextCard(); }
function markUnknown(idx) { updateScore(0); answeredQuestions[`card${currentSection}${idx}`] = true; nextCard(); }

function renderTrainer() {
  const sec = sections[currentSection];
  const qs = sec.questions[currentDiff];
  const labels = {easy:'🟢 Базовый (ОГЭ)',medium:'🟡 Средний (ЕГЭ часть 1)',hard:'🔴 Сложный (ЕГЭ часть 2)'};
  const done = Object.keys(answeredQuestions).filter(k => k.startsWith(`t${currentSection}-${currentDiff}`)).length;
  return `
    <div class="flex flex-wrap gap-2 mb-4">
      ${['easy','medium','hard'].map(d=>{
        const labels2={easy:'🟢 Базовый',medium:'🟡 Средний',hard:'🔴 Сложный'};
        return `<button onclick="setDifficulty('${d}')" class="diff-btn ${currentDiff===d?'active':''} px-5 py-2.5 rounded-xl text-base font-bold bg-pastel-100 text-pastel-800" data-diff="${d}">${labels2[d]}</button>`;
      }).join('')}
    </div>
    <div class="bg-white rounded-3xl shadow-lg p-4 md:p-6 mb-4">
      <h3 class="text-xl md:text-2xl font-bold gradient-text">${labels[currentDiff]}</h3>
      <p class="text-gray-500">Вопрос ${done+1} из ${qs.length} | Верно: ${Object.keys(answeredQuestions).filter(k=>k.startsWith(`t${currentSection}-${currentDiff}`)&&answeredQuestions[k]).length}</p>
    </div>
    ${qs.map((q,qi)=>`
      <div class="bg-white rounded-3xl shadow-lg p-5 md:p-7 mb-5 hover-lift card-3d">
        <div class="flex items-start gap-3 md:gap-4 mb-5">
          <span class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-2xl flex items-center justify-center font-bold text-lg md:text-xl flex-shrink-0">${qi+1}</span>
          <h3 class="text-lg md:text-2xl font-semibold text-gray-800 leading-snug">${q.q}</h3>
        </div>
        <div class="space-y-2 md:space-y-3 ml-12 md:ml-16">
          ${q.opts.map((opt,oi)=>`<div class="quiz-opt border-2 border-gray-200 rounded-xl md:rounded-2xl p-3 md:p-4 flex items-center gap-3 md:gap-4 text-base md:text-xl ${selectedAnswers['t'+qi]===oi?'selected':''}" onclick="selectTrainer(${qi},${oi})"><span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-pastel-100 text-pastel-700 flex items-center justify-center font-bold text-lg">${String.fromCharCode(65+oi)}</span><span class="font-medium">${opt}</span></div>`).join('')}
        </div>
        <div class="ml-12 md:ml-16 mt-5 flex flex-wrap gap-3">
          <button onclick="checkTrainer(${qi})" class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white px-6 md:px-8 py-2.5 md:py-3 rounded-2xl text-base md:text-xl font-bold hover:shadow-lg transition-all hover:scale-105">Проверить ✓</button>
          ${selectedAnswers['t'+qi+'_checked']?`<span class="self-center text-lg md:text-xl font-bold ${selectedAnswers['t'+qi+'_correct']?'text-green-600':'text-red-600'}">${selectedAnswers['t'+qi+'_correct']?'✅ Верно! +1 балл':'❌ Неверно'}</span>`:''}
        </div>
        ${selectedAnswers['t'+qi+'_checked']?`<div class="ml-12 md:ml-16 mt-4 ${selectedAnswers['t'+qi+'_correct']?'bg-green-50 border-green-200':'bg-red-50 border-red-200'} border-2 rounded-2xl p-4 md:p-5 text-base md:text-xl">${q.sol}</div>`:''}
      </div>
    `).join('')}
  `;
}

function selectTrainer(qi, oi) { selectedAnswers['t'+qi] = oi; renderSection(); }
function checkTrainer(qi) {
  const sec = sections[currentSection];
  const q = sec.questions[currentDiff][qi];
  if (selectedAnswers['t'+qi] === undefined) return;
  const isCorrect = selectedAnswers['t'+qi] === q.correct;
  selectedAnswers['t'+qi+'_checked'] = true;
  selectedAnswers['t'+qi+'_correct'] = isCorrect;
  answeredQuestions[`t${currentSection}-${currentDiff}-${qi}`] = isCorrect;
  if (isCorrect) updateScore(1); else updateScore(0);
  renderSection();
}

function renderMatching() {
  return sections[currentSection].matching.map((q,qi) => {
    const shuffledRight = [...q.right].map((item, origIdx) => ({item, origIdx})).sort(() => Math.random() - 0.5);
    return `
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6">
      <h3 class="text-2xl md:text-3xl font-bold gradient-text mb-5">🔗 Установите соответствие</h3>
      <div class="grid md:grid-cols-2 gap-4 md:gap-6">
        <div>
          <h4 class="text-lg md:text-xl font-bold text-pastel-700 mb-3">Понятия:</h4>
          ${q.left.map((item,li) => `<div class="matching-item border-2 ${matchedPairs['m'+qi+'_'+li]!==undefined?'border-green-400 bg-green-50 matched':selectedMatchItem==='l_'+qi+'_'+li?'border-pastel-500 selected':'border-gray-200'} rounded-xl md:rounded-2xl p-3 md:p-4 text-base md:text-xl font-medium mb-2 md:mb-3" onclick="selectMatchLeft(${qi},${li})">${item}</div>`).join('')}
        </div>
        <div>
          <h4 class="text-lg md:text-xl font-bold text-burgundy-700 mb-3">Определения:</h4>
          ${shuffledRight.map(({item, origIdx}) => `<div class="matching-item border-2 ${matchedPairs['r'+qi+'_'+origIdx]!==undefined?'border-green-400 bg-green-50 matched':selectedMatchItem==='r_'+qi+'_'+origIdx?'border-pastel-500 selected':'border-gray-200'} rounded-xl md:rounded-2xl p-3 md:p-4 text-base md:text-xl mb-2 md:mb-3" onclick="selectMatchRight(${qi},${origIdx})">${item}</div>`).join('')}
        </div>
      </div>
      <div class="mt-5 flex flex-wrap gap-3">
        <button onclick="resetMatching(${qi})" class="bg-gray-200 text-gray-700 px-5 py-2.5 rounded-xl md:rounded-2xl text-base md:text-lg font-bold hover:bg-gray-300 transition-all">Сбросить</button>
        <button onclick="checkMatching(${qi})" class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white px-6 md:px-8 py-2.5 md:py-3 rounded-xl md:rounded-2xl text-base md:text-lg font-bold hover:shadow-lg transition-all hover:scale-105">Проверить ✓</button>
      </div>
      <div id="match-result-${qi}" class="mt-3 text-lg md:text-xl font-bold"></div>
      ${matchedPairs['m'+qi+'_checked']?`<div class="mt-3 bg-pastel-50 border-2 border-pastel-200 rounded-2xl p-4 md:p-5 text-base md:text-xl"><strong>Правильные ответы:</strong>${q.left.map((l,i)=>`<br>• ${l} → ${q.right[q.correct[i]]}`).join('')}</div>`:''}
    </div>
    `;
  }).join('');
}

function selectMatchLeft(qi, li) { selectedMatchItem = 'l_'+qi+'_'+li; renderSection(); }
function selectMatchRight(qi, ri) {
  if (!selectedMatchItem || !selectedMatchItem.startsWith('l_')) return;
  const li = parseInt(selectedMatchItem.split('_')[2]);
  matchedPairs['m'+qi+'_'+li] = ri;
  matchedPairs['r'+qi+'_'+ri] = li;
  selectedMatchItem = null;
  renderSection();
}
function resetMatching(qi) {
  Object.keys(matchedPairs).forEach(k => { if (k.includes('m'+qi+'_') || k.includes('r'+qi+'_')) delete matchedPairs[k]; });
  selectedMatchItem = null; renderSection();
}
function checkMatching(qi) {
  const q = sections[currentSection].matching[0];
  let correct = 0;
  for (let i = 0; i < q.left.length; i++) { if (matchedPairs['m'+qi+'_'+i] === q.correct[i]) correct++; }
  matchedPairs['m'+qi+'_checked'] = true;
  answeredQuestions['match'+currentSection] = true;
  if (correct === q.left.length) { updateScore(1); document.getElementById('match-result-'+qi).innerHTML = '<span class="text-green-600">✅ Все верно! +1 балл</span>'; }
  else { updateScore(0); document.getElementById('match-result-'+qi).innerHTML = '<span class="text-red-600">❌ Верно '+correct+' из '+q.left.length+'</span>'; }
  renderSection();
}

function renderOpen() {
  return sections[currentSection].open.map((q,qi) => `
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6 hover-lift">
      <div class="flex items-start gap-3 md:gap-4 mb-5">
        <span class="bg-gradient-to-r from-burgundy-500 to-pastel-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-2xl flex items-center justify-center font-bold text-lg md:text-xl flex-shrink-0">${qi+1}</span>
        <h3 class="text-lg md:text-2xl font-semibold text-gray-800 leading-snug">${q.q}</h3>
      </div>
      <div class="ml-12 md:ml-16 mb-5"><textarea id="open-${qi}" class="w-full border-2 border-pastel-200 rounded-xl md:rounded-2xl p-4 md:p-5 text-base md:text-xl focus:border-pastel-500 focus:outline-none resize-none shadow-inner" rows="5" placeholder="Введите ваше решение..."></textarea></div>
      <div class="ml-12 md:ml-16 flex flex-wrap gap-3">
        <button onclick="showOpenHint(${qi})" class="bg-yellow-100 text-yellow-800 px-5 py-2.5 rounded-xl md:rounded-2xl text-base md:text-lg font-bold hover:bg-yellow-200 transition-all">💡 Подсказка</button>
        <button onclick="showOpenAnswer(${qi})" class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white px-6 md:px-8 py-2.5 md:py-3 rounded-xl md:rounded-2xl text-base md:text-lg font-bold hover:shadow-lg transition-all hover:scale-105">Показать решение ✓</button>
      </div>
      <div id="hint-${qi}" class="ml-12 md:ml-16 mt-4 hidden bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-4 md:p-5 text-base md:text-xl text-yellow-900">${q.hint}</div>
      <div id="answer-${qi}" class="ml-12 md:ml-16 mt-4 hidden bg-green-50 border-2 border-green-200 rounded-2xl p-4 md:p-5 text-base md:text-xl text-green-900"><strong>Решение:</strong><br>${q.answer}</div>
    </div>
  `).join('');
}

function showOpenHint(qi) { document.getElementById('hint-'+qi).classList.toggle('hidden'); }
function showOpenAnswer(qi) {
  const el = document.getElementById('answer-'+qi);
  el.classList.toggle('hidden');
  if (!el.classList.contains('hidden') && !answeredQuestions['open'+currentSection+qi]) { updateScore(1); answeredQuestions['open'+currentSection+qi] = true; }
}

function renderDetailed() {
  return sections[currentSection].detailed.map((q,qi) => `
    <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6 hover-lift">
      <div class="flex items-start gap-3 md:gap-4 mb-5">
        <span class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white w-10 h-10 md:w-12 md:h-12 rounded-2xl flex items-center justify-center font-bold text-lg md:text-xl flex-shrink-0">${qi+1}</span>
        <h3 class="text-lg md:text-2xl font-semibold text-gray-800 leading-snug">${q.q}</h3>
      </div>
      <div class="ml-12 md:ml-16">
        <button onclick="toggleSteps(${qi})" class="bg-gradient-to-r from-pastel-500 to-burgundy-600 text-white px-6 md:px-8 py-2.5 md:py-3 rounded-xl md:rounded-2xl text-base md:text-xl font-bold hover:shadow-lg transition-all hover:scale-105 mb-4">📋 Показать пошаговое решение</button>
        <div id="steps-${qi}" class="step-reveal space-y-3 md:space-y-4">
          ${q.steps.map((step,si) => `<div class="${step.startsWith('⚠️')?'bg-yellow-50 border-yellow-400':'bg-pastel-50 border-pastel-400'} border-l-4 rounded-r-2xl p-4 md:p-5 text-base md:text-xl slide-in" style="animation-delay:${si*0.15}s">${step}</div>`).join('')}
          <div class="bg-green-100 border-2 border-green-400 rounded-2xl p-4 md:p-5 text-base md:text-xl font-bold text-green-800 mt-4">✅ Ответ: ${q.answer}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleSteps(qi) {
  const el = document.getElementById('steps-'+qi);
  el.classList.toggle('visible');
  if (el.classList.contains('visible') && !answeredQuestions['step'+currentSection+qi]) { updateScore(1); answeredQuestions['step'+currentSection+qi] = true; }
}

document.addEventListener('keydown', (e) => {
  if (currentTab !== 'cards') return;
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(cardIndex); }
});

setSection(0);
updateProgress();
</script>
</body>
</html>
